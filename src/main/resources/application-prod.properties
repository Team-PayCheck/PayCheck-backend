# ==========================================
# 프로덕션 배포 환경 설정 (spring.profiles.active=prod)
# ==========================================

# Cookie Configuration - 배포 HTTPS 환경
# SameSite=None: 프론트엔드와 백엔드가 다른 도메인일 때 크로스 사이트 쿠키 허용
# Secure=true: SameSite=None은 반드시 Secure=true와 함께 사용해야 함
cookie.secure=true
cookie.same-site=None

# CORS Configuration - 환경변수 필수 주입 (예: CORS_ALLOWED_ORIGINS=https://your-frontend.vercel.app,http://localhost:5173)
# 반드시 배포 시 실제 프론트엔드 도메인을 환경변수로 설정해야 합니다. 미설정 시 애플리케이션이 시작되지 않습니다.
cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

# Encryption Configuration - 반드시 환경변수로 주입
encryption.aes-key=${ENCRYPTION_AES_KEY}

# AWS S3 Configuration - 반드시 환경변수 또는 IAM Role로 설정
aws.s3.bucket=${AWS_S3_BUCKET}
aws.s3.region=${AWS_S3_REGION:ap-northeast-2}
aws.s3.profile-image-dir=${AWS_S3_PROFILE_IMAGE_DIR:profiles}
aws.s3.access-key=${AWS_S3_ACCESS_KEY:}
aws.s3.secret-key=${AWS_S3_SECRET_KEY:}

# JPA Configuration - prod 환경 최적화
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=none

# spring.main.lazy-initialization 제거 (#189)
# Spring Security의 SecurityFilterChain 자동 구성이 lazy 초기화 상태에서
# 사용자 정의 SecurityFilterChain 빈을 감지하지 못해 폴백 보안(inMemoryUserDetailsManager)이
# 활성화되는 문제가 발생했다. 메모리 스파이크가 다시 문제될 경우 lazy-init이 아닌
# Hibernate plan cache 한도 / Tomcat 스레드 한도 / OSIV 비활성화 등으로 대응한다.

# Database Configuration - AWS RDS MySQL
# 반드시 환경변수로 주입: DB_HOST, DB_USERNAME, DB_PASSWORD
# DB_PORT(기본값: 3306), DB_NAME(기본값: paycheck)은 선택적
spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT:3306}/${DB_NAME:paycheck}?useSSL=true&requireSSL=true&serverTimezone=Asia/Seoul&rewriteBatchedStatements=true
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
